<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../generico.css">
    <link rel="stylesheet" href="../contenedor css/horarios.css">
    <title>Horarios cineCode</title>
</head>

<body>
    <header>
        <a class="inicio" href="../index.html">Inicio</a>
        <a class="inicio" href="cartelera.html">Cartelera</a>
        <a class="inicio" href="../contenedor html/registrarse.html">Registro</a>
    </header>
    <div id="tabla-Horarios">
        <img id="mario" src="../Imagenes/MarioGalaxy.png" alt="Mario">

        <table id="lunes" border="1">
            <thead>
                <tr>
                    <th>Horarios</th>
                    <th>Dia</th>
                    <th>Cantidad de entradas</th>

                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>09:00hs</td>
                    <td>
                        <div id="seleccionDia">
                            <label for="pelicula">Lunes</label>
                            <input type="radio" name="pelicula" id="pelicula" value="1">
                            <label for="pelicula">Jueves</label>
                            <input type="radio" name="pelicula" id="pelicula" value="2">
                            
                        </div>

                    </td>
                    <td>
                        <div id="cantEntradas">
                            <label for="cantidad-entradas"></label>
                            <select name="entradas" id="cantidad-entradas">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                            </select>
                            <input id="boton-seleccionar" type="button" value="Seleccionar">
                        </div>
                    </td>




                </tr>

                <tr>
                    <td>12.30hs</td>
                    <td>Martes y viernes</td>


                </tr>

                <tr>
                    <td>16.30hs</td>
                    <td>miercoles sabados y domingos</td>


                </tr>

            </tbody>
            <tfoot>

            </tfoot>
        </table>
